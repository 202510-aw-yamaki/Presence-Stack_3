<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Transition Visual Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --cy: #7fffe0;
            --cy2: #78b9ff;
            --vio: #b88dff;
            --panel: rgba(7, 16, 28, 0.76);
            --line: rgba(130, 255, 225, 0.18);
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", "Hiragino Sans", sans-serif;
            background: #02050a;
            color: #fff;
        }

        body {
            position: relative;
        }

        .page {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s ease;
        }

        .page-source {
            z-index: 1;
            background:
                radial-gradient(circle at 20% 24%, rgba(68, 255, 208, 0.12), transparent 28%),
                radial-gradient(circle at 78% 26%, rgba(92, 159, 255, 0.12), transparent 28%),
                linear-gradient(160deg, #0b1827 0%, #07101b 50%, #04070d 100%);
        }

        .page-source.is-fading {
            opacity: 0;
            filter: blur(7px);
            transform: scale(1.02);
        }

        .page-source.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .page-target {
            z-index: 2;
            background:
                radial-gradient(circle at 25% 20%, rgba(110, 255, 220, 0.16), transparent 24%),
                radial-gradient(circle at 76% 34%, rgba(123, 179, 255, 0.16), transparent 24%),
                linear-gradient(155deg, #081321 0%, #0a1120 48%, #05070f 100%);
            opacity: 0;
            filter: blur(10px) saturate(0.9);
            transform: translateY(22px) scale(0.988);
            pointer-events: none;
        }

        .page-target.is-revealing {
            opacity: 0.68;
            filter: blur(3px) saturate(1);
            transform: translateY(8px) scale(0.996);
        }

        .page-target.is-visible {
            opacity: 1;
            filter: blur(0) saturate(1);
            transform: translateY(0) scale(1);
        }

        .panel {
            width: min(760px, 92vw);
            padding: 38px 32px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 26px 64px rgba(0, 0, 0, 0.34);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .tag {
            display: inline-block;
            padding: 6px 12px;
            margin-bottom: 14px;
            border-radius: 999px;
            border: 1px solid rgba(127, 255, 224, 0.26);
            background: rgba(127, 255, 224, 0.10);
            color: #a4ffeb;
            font-size: 12px;
            letter-spacing: 0.16em;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(32px, 5vw, 52px);
            letter-spacing: 0.06em;
            font-weight: 700;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.85;
            color: rgba(255, 255, 255, 0.78);
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #001015;
            background: linear-gradient(90deg, #75ffe0, #79c5ff);
            box-shadow: 0 10px 30px rgba(121, 197, 255, 0.22);
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            transition: opacity 0.3s ease;
            background:
                radial-gradient(circle at 50% 42%, rgba(12, 28, 48, 0.42) 0%, rgba(4, 9, 16, 0.82) 54%, rgba(1, 4, 10, 0.97) 100%),
                linear-gradient(180deg, rgba(5, 12, 22, 0.86), rgba(2, 5, 10, 0.96));
        }

        .overlay.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay.is-fading {
            opacity: 0;
            transition: opacity 0.84s ease;
        }

        #streamCanvas,
        #neuronCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #streamCanvas {
            opacity: 0.78;
        }

        #neuronCanvas {
            opacity: 0.26;
        }

        .center-glow {
            position: absolute;
            left: 50%;
            top: 42%;
            width: min(54vw, 620px);
            height: min(54vw, 620px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            background:
                radial-gradient(circle, rgba(116, 255, 225, 0.18) 0%, rgba(116, 255, 225, 0.07) 22%, rgba(116, 255, 225, 0.02) 34%, rgba(116, 255, 225, 0) 68%);
            filter: blur(14px);
            opacity: 0.95;
        }

        .vanishing-ring {
            position: absolute;
            left: 50%;
            top: 42%;
            width: min(10vw, 110px);
            height: min(10vw, 110px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(127, 255, 224, 0.26);
            box-shadow:
                0 0 48px rgba(127, 255, 224, 0.16),
                0 0 86px rgba(120, 185, 255, 0.09),
                inset 0 0 24px rgba(127, 255, 224, 0.10);
            pointer-events: none;
            opacity: 0.9;
        }

        .character-lane {
            position: absolute;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            width: min(34vw, 380px);
            height: min(30vw, 300px);
            pointer-events: none;
            opacity: 0.42;
        }

        .character-lane::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            width: 26%;
            height: 20%;
            transform: translateX(-50%);
            border: 1px dashed rgba(127, 255, 224, 0.18);
            border-radius: 50%;
            filter: blur(0.3px);
        }

        .character-lane::after {
            content: "future character run lane";
            position: absolute;
            left: 50%;
            bottom: -12px;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 0.16em;
            color: rgba(255, 255, 255, 0.30);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .lane-line {
            position: absolute;
            top: 10%;
            bottom: 18%;
            width: 1px;
            background: linear-gradient(180deg, rgba(127, 255, 224, 0.18), rgba(127, 255, 224, 0.04));
            filter: blur(0.2px);
        }

        .lane-line.left {
            left: 38%;
            transform: rotate(12deg);
            transform-origin: top center;
        }

        .lane-line.right {
            right: 38%;
            transform: rotate(-12deg);
            transform-origin: top center;
        }

        .loading-panel {
            position: absolute;
            left: 50%;
            bottom: 9vh;
            transform: translateX(-50%);
            width: min(580px, 90vw);
            padding: 24px 22px 22px;
            border-radius: 18px;
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32), inset 0 0 18px rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
        }

        .loading-top {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 14px;
        }

        .loading-title {
            margin: 0 0 6px;
            font-size: 12px;
            letter-spacing: 0.22em;
            color: #9bffe7;
        }

        .loading-message {
            margin: 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.76);
        }

        .loading-percent {
            min-width: 66px;
            text-align: right;
            font-size: 28px;
            font-weight: 800;
            color: var(--cy);
        }

        .bar-wrap {
            position: relative;
            height: 14px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            position: relative;
            transition: width 0.45s cubic-bezier(.22, .61, .36, 1);
            background: linear-gradient(90deg, var(--cy) 0%, var(--cy2) 55%, var(--vio) 100%);
            box-shadow: 0 0 18px rgba(127, 255, 224, 0.42), 0 0 28px rgba(120, 185, 255, 0.18);
        }

        .bar-fill::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.34) 48%, rgba(255, 255, 255, 0) 72%);
            animation: shine 1.2s linear infinite;
        }

        @keyframes shine {
            from {
                transform: translateX(-150%);
            }

            to {
                transform: translateX(200%);
            }
        }

        .bar-steps {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.38);
            letter-spacing: 0.12em;
        }

        .bar-steps span.active {
            color: #a8ffed;
        }

        .loading-meta {
            margin-top: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            color: rgba(127, 255, 224, 0.52);
            letter-spacing: 0.1em;
            white-space: nowrap;
            overflow: hidden;
        }

        .timeline {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 20;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(3, 8, 15, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 12px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(8px);
        }

        .timeline b {
            color: #b0fff0;
        }

        @media (max-width: 720px) {
            .timeline {
                left: 14px;
                right: 14px;
                top: 14px;
            }

            .panel {
                padding: 28px 22px;
            }

            .loading-panel {
                bottom: 6vh;
            }

            .loading-top {
                align-items: center;
            }

            .loading-percent {
                font-size: 24px;
            }

            .character-lane {
                width: 50vw;
                height: 34vw;
            }
        }
    </style>
</head>

<body>
    <section class="page page-source" id="sourcePage">
        <div class="panel">
            <div class="tag">SOURCE PAGE</div>
            <h1>遷移元ページ</h1>
            <p>
                中央の奥へもっと速く吸い込まれるトンネル感を強めたデモです。<br>
                64進数の渦が時計回りで消失点に落ち込み、あとでキャラクターがその奥から手前へ来る前提のレーンも残しています。
            </p>
            <button id="startBtn">3秒デモを再生</button>
        </div>
    </section>

    <section class="page page-target" id="targetPage">
        <div class="panel">
            <div class="tag">TARGET PAGE</div>
            <h1>遷移後ページ</h1>
            <p>
                72% までは見せず、72〜99% で徐々に浮かび上がる見え方です。<br>
                実装時はこの背後に本物の遷移先ページがいる構成にします。
            </p>
        </div>
    </section>

    <div class="overlay" id="overlay" aria-hidden="true">
        <canvas id="streamCanvas"></canvas>
        <canvas id="neuronCanvas"></canvas>
        <div class="center-glow"></div>
        <div class="vanishing-ring"></div>

        <div class="character-lane">
            <div class="lane-line left"></div>
            <div class="lane-line right"></div>
        </div>

        <div class="loading-panel">
            <div class="loading-top">
                <div>
                    <p class="loading-title">NEURAL TRANSFER</p>
                    <p class="loading-message" id="loadingMessage">初期化中...</p>
                </div>
                <div class="loading-percent" id="loadingPercent">0%</div>
            </div>

            <div class="bar-wrap">
                <div class="bar-fill" id="barFill"></div>
            </div>

            <div class="bar-steps" id="barSteps">
                <span data-step="0" class="active">0%</span>
                <span data-step="16">16%</span>
                <span data-step="44">44%</span>
                <span data-step="72">72%</span>
                <span data-step="99">99%</span>
            </div>

            <div class="loading-meta" id="loadingMeta"></div>
        </div>
    </div>

    <div class="timeline">
        <div><b>0〜16%</b> 遷移元が薄くなる</div>
        <div><b>16〜72%</b> 画像なし</div>
        <div><b>72〜99%</b> 遷移先が濃くなる</div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const sourcePage = document.getElementById('sourcePage');
        const targetPage = document.getElementById('targetPage');
        const startBtn = document.getElementById('startBtn');
        const barFill = document.getElementById('barFill');
        const loadingPercent = document.getElementById('loadingPercent');
        const loadingMessage = document.getElementById('loadingMessage');
        const loadingMeta = document.getElementById('loadingMeta');
        const barSteps = document.querySelectorAll('#barSteps span');

        const BASE64_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
        const DURATION = 3000;
        const MARKS = [
            { t: 0, p: 0, m: 'initializing...' },
            { t: 480, p: 16, m: 'source fade out' },
            { t: 1280, p: 44, m: 'neural transfer tunnel' },
            { t: 2180, p: 72, m: 'target reveal start' },
            { t: 2850, p: 99, m: 'render almost done' }
        ];

        let running = false;
        let rafId = 0;

        function setStepActive(value) {
            barSteps.forEach(node => {
                node.classList.toggle('active', Number(node.dataset.step) <= value);
            });
        }

        function setProgress(value, msg) {
            barFill.style.width = value + '%';
            loadingPercent.textContent = value + '%';
            loadingMessage.textContent = msg;
            setStepActive(value);
        }

        function resetDemo() {
            cancelAnimationFrame(rafId);
            overlay.classList.remove('is-active', 'is-fading');
            overlay.setAttribute('aria-hidden', 'true');
            sourcePage.classList.remove('is-fading', 'is-hidden');
            sourcePage.style.opacity = '';
            sourcePage.style.filter = '';
            sourcePage.style.transform = '';
            targetPage.classList.remove('is-revealing', 'is-visible');
            targetPage.style.opacity = '';
            targetPage.style.filter = '';
            targetPage.style.transform = '';
            setProgress(0, '初期化中...');
        }

        function renderState(elapsed) {
            const p = Math.min(elapsed / DURATION, 1);

            if (elapsed <= 480) {
                const local = elapsed / 480;
                sourcePage.classList.add('is-fading');
                sourcePage.style.opacity = String(1 - local);
                sourcePage.style.filter = `blur(${local * 7}px)`;
                sourcePage.style.transform = `scale(${1 + local * 0.02})`;
            } else {
                sourcePage.classList.add('is-hidden');
            }

            if (elapsed < 2180) {
                targetPage.classList.remove('is-revealing', 'is-visible');
            } else if (elapsed < 2850) {
                targetPage.classList.add('is-revealing');
                const local = (elapsed - 2180) / (2850 - 2180);
                targetPage.style.opacity = String(0.12 + local * 0.76);
                targetPage.style.filter = `blur(${7 - local * 6}px)`;
                targetPage.style.transform = `translateY(${18 - local * 13}px) scale(${0.992 + local * 0.008})`;
            } else {
                targetPage.classList.remove('is-revealing');
                targetPage.classList.add('is-visible');
            }

            if (elapsed >= 2180) {
                overlay.classList.add('is-fading');
            }

            let current = MARKS[0];
            for (const mark of MARKS) {
                if (elapsed >= mark.t) current = mark;
            }
            setProgress(current.p, current.m);

            if (p < 1) {
                rafId = requestAnimationFrame(() => renderState(performance.now() - window.__demoStart));
            } else {
                overlay.classList.remove('is-active', 'is-fading');
                overlay.setAttribute('aria-hidden', 'true');
                targetPage.classList.add('is-visible');
                running = false;
            }
        }

        function startDemo() {
            if (running) return;
            running = true;
            resetDemo();
            overlay.classList.add('is-active');
            overlay.setAttribute('aria-hidden', 'false');
            window.__demoStart = performance.now();
            rafId = requestAnimationFrame(() => renderState(0));
        }

        startBtn.addEventListener('click', startDemo);

        function randomHexByte() {
            return '0x' + Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0');
        }

        function randomBinary(len = 8) {
            let s = '';
            for (let i = 0; i < len; i++) s += Math.random() > 0.5 ? '1' : '0';
            return s;
        }

        function randomBase64Token(length = 3) {
            let s = '';
            for (let i = 0; i < length; i++) {
                s += BASE64_CHARS[Math.floor(Math.random() * BASE64_CHARS.length)];
            }
            return s;
        }

        function createMixedMeta() {
            const out = [];
            for (let i = 0; i < 14; i++) {
                const r = Math.random();
                if (r < 0.35) out.push(randomBinary(8));
                else if (r < 0.7) out.push(randomHexByte());
                else out.push(randomBase64Token(4));
            }
            return out.join('  ');
        }

        setInterval(() => {
            loadingMeta.textContent = createMixedMeta();
        }, 130);
        loadingMeta.textContent = createMixedMeta();

        const streamCanvas = document.getElementById('streamCanvas');
        const sctx = streamCanvas.getContext('2d');
        let sw = 0, sh = 0;
        let binaryParticles = [];
        let hexParticles = [];
        let spiralParticles = [];
        let vp = { x: 0, y: 0 };

        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        function choose(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function setupStreams() {
            sw = streamCanvas.width = innerWidth;
            sh = streamCanvas.height = innerHeight;
            vp = { x: sw * 0.5, y: sh * 0.42 };
            binaryParticles = Array.from({ length: Math.max(120, Math.floor(sw / 10)) }, () => spawnBinary());
            hexParticles = Array.from({ length: Math.max(88, Math.floor(sw / 14)) }, () => spawnHex());
            spiralParticles = Array.from({ length: Math.max(42, Math.floor(sw / 34)) }, () => spawnSpiral());
        }

        function spawnBinary() {
            const fromTop = Math.random() > 0.5;
            const sideSpread = rand(-sw * 0.62, sw * 0.62);
            const startX = vp.x + sideSpread;
            const startY = fromTop ? rand(-sh * 0.28, -30) : rand(sh + 30, sh * 1.22);
            return {
                type: 'binary',
                text: Math.random() > 0.5 ? '1' : '0',
                x: startX,
                y: startY,
                prevX: startX,
                prevY: startY,
                startX,
                startY,
                age: Math.random(),
                speed: rand(0.014, 0.028),
                startSize: rand(20, 42),
                endSize: rand(3, 7),
                hue: fromTop ? 'rgba(127,255,224,' : 'rgba(120,185,255,',
                trail: fromTop ? 'rgba(127,255,224,' : 'rgba(120,185,255,'
            };
        }

        function spawnHex() {
            const fromLeft = Math.random() > 0.5;
            const verticalSpread = rand(-sh * 0.44, sh * 0.44);
            const startX = fromLeft ? rand(-sw * 0.34, -70) : rand(sw + 70, sw * 1.34);
            const startY = vp.y + verticalSpread;
            return {
                type: 'hex',
                text: randomHexByte(),
                x: startX,
                y: startY,
                prevX: startX,
                prevY: startY,
                startX,
                startY,
                age: Math.random(),
                speed: rand(0.011, 0.022),
                startSize: rand(16, 28),
                endSize: rand(4, 8),
                hue: fromLeft ? 'rgba(120,185,255,' : 'rgba(153,216,255,',
                trail: fromLeft ? 'rgba(120,185,255,' : 'rgba(153,216,255,'
            };
        }

        function spawnSpiral() {
            const orbit = rand(Math.min(sw, sh) * 0.16, Math.min(sw, sh) * 0.44);
            const startAngle = rand(0, Math.PI * 2);
            return {
                type: 'spiral',
                text: randomBase64Token(Math.random() > 0.5 ? 3 : 4),
                x: vp.x,
                y: vp.y,
                prevX: vp.x,
                prevY: vp.y,
                orbit,
                startAngle,
                turns: rand(1.8, 3.2),
                age: Math.random(),
                speed: rand(0.010, 0.018),
                startSize: rand(16, 28),
                endSize: rand(4, 7),
                hue: choose(['rgba(184,141,255,', 'rgba(127,255,224,', 'rgba(120,185,255,'])
            };
        }

        function updateLinearParticle(p) {
            p.prevX = p.x;
            p.prevY = p.y;
            p.age += p.speed;
            if (p.age >= 1) {
                return p.type === 'binary' ? spawnBinary() : spawnHex();
            }

            const ease = 1 - Math.pow(1 - p.age, 3.15);
            p.x = p.startX + (vp.x - p.startX) * ease;
            p.y = p.startY + (vp.y - p.startY) * ease;
            return p;
        }

        function updateSpiralParticle(p) {
            p.prevX = p.x;
            p.prevY = p.y;
            p.age += p.speed;
            if (p.age >= 1) {
                return spawnSpiral();
            }

            const ease = 1 - Math.pow(1 - p.age, 2.8);
            const radius = Math.max(2, p.orbit * Math.pow(1 - ease, 1.12));
            const angle = p.startAngle + ease * p.turns * Math.PI * 2;
            p.x = vp.x + Math.cos(angle) * radius;
            p.y = vp.y + Math.sin(angle) * radius * 0.72;
            return p;
        }

        function drawTrail(p, alpha) {
            sctx.strokeStyle = (p.trail || p.hue) + alpha + ')';
            sctx.lineWidth = 1;
            sctx.beginPath();
            sctx.moveTo(p.prevX, p.prevY);
            sctx.lineTo(p.x, p.y);
            sctx.stroke();
        }

        function drawParticle(p, alphaBoost = 0) {
            const scale = p.startSize + (p.endSize - p.startSize) * p.age;
            const alpha = Math.max(0.07, 0.98 - p.age * (0.9 - alphaBoost));
            drawTrail(p, Math.min(0.52, alpha * 0.55));
            sctx.font = `${scale}px monospace`;
            sctx.fillStyle = p.hue + alpha + ')';
            sctx.shadowBlur = 16;
            sctx.shadowColor = p.hue + Math.min(0.78, alpha * 0.68) + ')';
            sctx.fillText(p.text, p.x, p.y);
        }

        function drawStreams() {
            sctx.clearRect(0, 0, sw, sh);
            sctx.textAlign = 'center';
            sctx.textBaseline = 'middle';

            binaryParticles = binaryParticles.map(updateLinearParticle);
            hexParticles = hexParticles.map(updateLinearParticle);
            spiralParticles = spiralParticles.map(updateSpiralParticle);

            binaryParticles.forEach(p => drawParticle(p, 0));
            hexParticles.forEach(p => drawParticle(p, 0.06));
            spiralParticles.forEach(p => drawParticle(p, 0.12));

            sctx.shadowBlur = 0;
            requestAnimationFrame(drawStreams);
        }

        setupStreams();
        drawStreams();

        const neuronCanvas = document.getElementById('neuronCanvas');
        const nctx = neuronCanvas.getContext('2d');
        let nw = 0, nh = 0;
        let nodes = [];
        let synapses = [];

        function cubicPoint(p0, p1, p2, p3, t) {
            const mt = 1 - t;
            return {
                x: mt * mt * mt * p0.x + 3 * mt * mt * t * p1.x + 3 * mt * t * t * p2.x + t * t * t * p3.x,
                y: mt * mt * mt * p0.y + 3 * mt * mt * t * p1.y + 3 * mt * t * t * p2.y + t * t * t * p3.y
            };
        }

        function setupNeuron() {
            nw = neuronCanvas.width = innerWidth;
            nh = neuronCanvas.height = innerHeight;

            const count = Math.max(18, Math.floor(nw / 110));
            nodes = Array.from({ length: count }, () => ({
                orbit: rand(30, Math.min(nw, nh) * 0.34),
                angle: rand(0, Math.PI * 2),
                speed: rand(0.0016, 0.0052),
                drift: rand(-18, 18),
                r: rand(1.4, 3.2)
            }));

            const synapseCount = Math.max(10, Math.floor(nw / 160));
            synapses = Array.from({ length: synapseCount }, (_, i) => {
                const baseAngle = (Math.PI * 2 * i) / synapseCount + rand(-0.18, 0.18);
                return {
                    angle: baseAngle,
                    radius: rand(Math.min(nw, nh) * 0.40, Math.min(nw, nh) * 0.60),
                    bulbR: rand(10, 22),
                    branchPull: rand(0.22, 0.36),
                    wobble: rand(-16, 16),
                    pulseOffset: Math.random(),
                    vesicles: Array.from({ length: 4 + Math.floor(Math.random() * 4) }, () => ({
                        orbit: rand(14, 32),
                        angle: rand(0, Math.PI * 2),
                        speed: rand(0.004, 0.012),
                        r: rand(1.6, 3.4)
                    }))
                };
            });
        }

        function drawNeuron() {
            nctx.clearRect(0, 0, nw, nh);
            const time = performance.now() * 0.001;

            synapses.forEach((synapse, index) => {
                const driftAngle = synapse.angle + Math.sin(time * 0.35 + index * 0.7) * 0.06;
                const bulb = {
                    x: vp.x + Math.cos(driftAngle) * synapse.radius,
                    y: vp.y + Math.sin(driftAngle) * synapse.radius * 0.78
                };

                const innerA = {
                    x: vp.x + Math.cos(driftAngle - 0.24) * synapse.radius * synapse.branchPull,
                    y: vp.y + Math.sin(driftAngle - 0.24) * synapse.radius * synapse.branchPull * 0.74
                };
                const innerB = {
                    x: vp.x + Math.cos(driftAngle + 0.18) * synapse.radius * (synapse.branchPull + 0.14),
                    y: vp.y + Math.sin(driftAngle + 0.18) * synapse.radius * (synapse.branchPull + 0.14) * 0.72 + synapse.wobble * 0.2
                };

                nctx.strokeStyle = 'rgba(127,255,224,0.11)';
                nctx.lineWidth = 1.2;
                nctx.beginPath();
                nctx.moveTo(bulb.x, bulb.y);
                nctx.bezierCurveTo(innerB.x, innerB.y, innerA.x, innerA.y, vp.x, vp.y);
                nctx.stroke();

                nctx.strokeStyle = 'rgba(120,185,255,0.08)';
                nctx.lineWidth = 3.2;
                nctx.beginPath();
                nctx.moveTo(bulb.x, bulb.y);
                nctx.bezierCurveTo(innerB.x, innerB.y, innerA.x, innerA.y, vp.x, vp.y);
                nctx.stroke();

                const pulseT = (time * 0.95 + synapse.pulseOffset) % 1;
                const pulseT2 = (pulseT + 0.22) % 1;
                const pulsePoint = cubicPoint(bulb, innerB, innerA, vp, 0.06 + pulseT * 0.84);
                const pulsePoint2 = cubicPoint(bulb, innerB, innerA, vp, 0.06 + pulseT2 * 0.84);

                nctx.strokeStyle = 'rgba(150,255,236,0.26)';
                nctx.lineWidth = 2.8;
                nctx.shadowBlur = 18;
                nctx.shadowColor = 'rgba(127,255,224,0.34)';
                nctx.beginPath();
                nctx.moveTo(bulb.x, bulb.y);
                nctx.bezierCurveTo(innerB.x, innerB.y, innerA.x, innerA.y, vp.x, vp.y);
                nctx.stroke();

                nctx.strokeStyle = 'rgba(120,185,255,0.14)';
                nctx.lineWidth = 5.2;
                nctx.beginPath();
                nctx.moveTo(bulb.x, bulb.y);
                nctx.bezierCurveTo(innerB.x, innerB.y, innerA.x, innerA.y, vp.x, vp.y);
                nctx.stroke();

                nctx.fillStyle = 'rgba(220,255,246,0.96)';
                nctx.shadowBlur = 28;
                nctx.shadowColor = 'rgba(127,255,224,0.88)';
                nctx.beginPath();
                nctx.arc(pulsePoint.x, pulsePoint.y, 3.8, 0, Math.PI * 2);
                nctx.fill();

                nctx.fillStyle = 'rgba(150,220,255,0.72)';
                nctx.shadowBlur = 18;
                nctx.shadowColor = 'rgba(120,185,255,0.72)';
                nctx.beginPath();
                nctx.arc(pulsePoint2.x, pulsePoint2.y, 2.4, 0, Math.PI * 2);
                nctx.fill();

                nctx.strokeStyle = 'rgba(200,255,245,0.34)';
                nctx.lineWidth = 1.3;
                nctx.beginPath();
                nctx.moveTo(pulsePoint2.x, pulsePoint2.y);
                nctx.lineTo(pulsePoint.x, pulsePoint.y);
                nctx.stroke();
                nctx.shadowBlur = 0;

                nctx.fillStyle = 'rgba(127,255,224,0.30)';
                nctx.beginPath();
                nctx.arc(bulb.x, bulb.y, synapse.bulbR * 1.18, 0, Math.PI * 2);
                nctx.fill();

                nctx.fillStyle = `rgba(210,255,245,${0.18 + 0.16 * Math.sin(time * 2.2 + index) ** 2})`;
                nctx.beginPath();
                nctx.arc(bulb.x, bulb.y, synapse.bulbR * 0.94, 0, Math.PI * 2);
                nctx.fill();

                nctx.fillStyle = 'rgba(127,255,224,0.46)';
                nctx.beginPath();
                nctx.arc(bulb.x, bulb.y, synapse.bulbR * 0.72, 0, Math.PI * 2);
                nctx.fill();

                nctx.strokeStyle = 'rgba(200,255,245,0.18)';
                nctx.lineWidth = 1;
                nctx.beginPath();
                nctx.arc(bulb.x, bulb.y, synapse.bulbR, 0, Math.PI * 2);
                nctx.stroke();

                synapse.vesicles.forEach((vesicle, vi) => {
                    vesicle.angle += vesicle.speed;
                    const vx = bulb.x + Math.cos(vesicle.angle + vi * 0.45) * vesicle.orbit;
                    const vy = bulb.y + Math.sin(vesicle.angle + vi * 0.45) * vesicle.orbit * 0.74;
                    nctx.fillStyle = vi % 2 === 0 ? 'rgba(120,185,255,0.34)' : 'rgba(127,255,224,0.34)';
                    nctx.beginPath();
                    nctx.arc(vx, vy, vesicle.r, 0, Math.PI * 2);
                    nctx.fill();
                });
            });

            const points = nodes.map(node => {
                node.angle += node.speed;
                return {
                    x: vp.x + Math.cos(node.angle) * node.orbit,
                    y: vp.y + Math.sin(node.angle) * (node.orbit * 0.6) + node.drift,
                    r: node.r
                };
            });

            for (let i = 0; i < points.length; i++) {
                const a = points[i];
                for (let j = i + 1; j < points.length; j++) {
                    const b = points[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.22;
                        nctx.strokeStyle = `rgba(127,255,224,${alpha})`;
                        nctx.lineWidth = 1;
                        nctx.beginPath();
                        nctx.moveTo(a.x, a.y);
                        nctx.lineTo(b.x, b.y);
                        nctx.stroke();
                    }
                }
            }

            points.forEach(point => {
                nctx.fillStyle = 'rgba(134,255,226,0.78)';
                nctx.beginPath();
                nctx.arc(point.x, point.y, point.r, 0, Math.PI * 2);
                nctx.fill();
            });

            requestAnimationFrame(drawNeuron);
        }

        setupNeuron();
        drawNeuron();

        window.addEventListener('resize', () => {
            setupStreams();
            setupNeuron();
        });
    </script>
</body>

</html>
