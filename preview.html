<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Transition Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      background: #050912;
      color: #fff;
    }

    body {
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      transition:
        opacity 0.5s ease,
        transform 0.5s ease,
        filter 0.5s ease;
    }

    .page-current {
      z-index: 1;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 255, 170, 0.08), transparent 30%),
        radial-gradient(circle at 80% 25%, rgba(0, 160, 255, 0.10), transparent 32%),
        linear-gradient(180deg, #09111e 0%, #03070f 100%);
    }

    .page-current.is-dimmed {
      opacity: 0.6;
      transform: scale(0.99);
      filter: blur(1px);
    }

    .page-next {
      z-index: 2;
      background:
        radial-gradient(circle at 30% 20%, rgba(120, 255, 220, 0.12), transparent 26%),
        radial-gradient(circle at 72% 36%, rgba(120, 180, 255, 0.10), transparent 28%),
        linear-gradient(180deg, #081321 0%, #04070d 100%);
      opacity: 0;
      transform: translateY(34px) scale(0.985);
      filter: blur(8px);
      pointer-events: none;
    }

    .page-next.is-rising {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .panel {
      width: min(720px, 92vw);
      padding: 36px 30px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .panel h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0.06em;
    }

    .panel p {
      margin: 0 0 22px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.78);
    }

    .panel button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #021217;
      background: linear-gradient(90deg, #6effdb, #7fc9ff);
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(110, 255, 219, 0.10);
      border: 1px solid rgba(110, 255, 219, 0.24);
      color: #9fffe6;
      font-size: 12px;
      letter-spacing: 0.16em;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(9, 19, 34, 0.72), rgba(2, 6, 12, 0.95) 72%),
        linear-gradient(180deg, rgba(4, 10, 18, 0.88), rgba(1, 4, 10, 0.96));
      transition: opacity 0.3s ease;
    }

    .loading-overlay.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .loading-overlay.is-fading-out {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #binaryCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.45;
    }

    .hex-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.42;
    }

    .hex-row {
      position: absolute;
      right: -140%;
      white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      letter-spacing: 0.18em;
      color: rgba(120, 190, 255, 0.72);
      text-shadow: 0 0 10px rgba(90, 170, 255, 0.18);
      animation-name: hexMove;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes hexMove {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-240vw);
      }
    }

    .overlay-noise {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.18;
      pointer-events: none;
    }

    .loading-panel {
      position: absolute;
      left: 50%;
      bottom: 11vh;
      transform: translateX(-50%);
      width: min(560px, 90vw);
      padding: 26px 22px 22px;
      border-radius: 18px;
      background: rgba(6, 12, 22, 0.74);
      border: 1px solid rgba(110, 255, 219, 0.18);
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.34),
        inset 0 0 18px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(7px);
    }

    .loading-top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 14px;
    }

    .loading-title {
      margin: 0 0 6px;
      color: #97ffe6;
      font-size: 12px;
      letter-spacing: 0.22em;
    }

    .loading-message {
      margin: 0;
      color: rgba(255,255,255,0.78);
      font-size: 14px;
    }

    .loading-percent {
      font-size: 26px;
      font-weight: 800;
      color: #6effdb;
      min-width: 64px;
      text-align: right;
    }

    .loading-bar {
      position: relative;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .loading-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, #6effdb 0%, #6ec8ff 55%, #b97dff 100%);
      box-shadow:
        0 0 18px rgba(110, 255, 219, 0.40),
        0 0 24px rgba(110, 200, 255, 0.18);
      transition: width 0.28s cubic-bezier(.22,.61,.36,1);
      position: relative;
    }

    .loading-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          120deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.34) 50%,
          rgba(255,255,255,0) 70%
        );
      animation: shine 1s linear infinite;
    }

    @keyframes shine {
      from {
        transform: translateX(-150%);
      }
      to {
        transform: translateX(200%);
      }
    }

    .loading-meta {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(110, 255, 219, 0.54);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.1em;
      white-space: nowrap;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <section class="screen page page-current" id="pageCurrent">
    <div class="panel">
      <div class="tag">CURRENT PAGE</div>
      <h1>現在のページ</h1>
      <p>
        ボタンを押すと、2秒のロード演出が始まります。<br>
        2進数は上から下、16進数は右から左に流れます。
      </p>
      <button id="startBtn">遷移演出を開始</button>
    </div>
  </section>

  <section class="screen page page-next" id="pageNext">
    <div class="panel">
      <div class="tag">NEXT PAGE</div>
      <h1>次のページ</h1>
      <p>
        これは「後ろから浮かび上がる」見え方を確認するためのデモです。<br>
        実サイトではここを本物の次ページ表示に差し替えます。
      </p>
    </div>
  </section>

  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
    <canvas id="binaryCanvas"></canvas>
    <div class="hex-layer" id="hexLayer"></div>
    <div class="overlay-noise"></div>

    <div class="loading-panel">
      <div class="loading-top">
        <div>
          <p class="loading-title">SYSTEM TRANSFER</p>
          <p class="loading-message" id="loadingMessage">初期化中...</p>
        </div>
        <div class="loading-percent" id="loadingPercent">0%</div>
      </div>

      <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
      </div>

      <div class="loading-meta" id="loadingMeta">
        10101100  0x7F  0x3C  01010011  0xD2  11001010  0x9A
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("loadingOverlay");
    const pageCurrent = document.getElementById("pageCurrent");
    const pageNext = document.getElementById("pageNext");
    const startBtn = document.getElementById("startBtn");

    const loadingFill = document.getElementById("loadingFill");
    const loadingPercent = document.getElementById("loadingPercent");
    const loadingMessage = document.getElementById("loadingMessage");
    const loadingMeta = document.getElementById("loadingMeta");
    const hexLayer = document.getElementById("hexLayer");

    let isTransitionRunning = false;

    function setProgress(value, message) {
      loadingFill.style.width = value + "%";
      loadingPercent.textContent = value + "%";
      loadingMessage.textContent = message;
    }

    function activateLoading() {
      if (isTransitionRunning) return;
      isTransitionRunning = true;

      // 初期化
      overlay.classList.remove("is-fading-out");
      overlay.classList.add("is-active");
      overlay.setAttribute("aria-hidden", "false");

      pageCurrent.classList.add("is-dimmed");
      pageNext.classList.remove("is-rising");

      setProgress(0, "初期化中...");

      // 0.5秒 -> 16%
      setTimeout(() => {
        setProgress(16, "接続準備中...");
      }, 500);

      // 1.0秒 -> 50%
      setTimeout(() => {
        setProgress(50, "データ同期中...");
      }, 1000);

      // 1.5秒 -> 99%
      setTimeout(() => {
        setProgress(99, "最終チェック中...");
      }, 1500);

      // 1.5秒から 0.5秒かけて次ページを後ろから浮かび上がらせる
      setTimeout(() => {
        pageNext.classList.add("is-rising");
        overlay.classList.add("is-fading-out");
      }, 1500);

      // 2.0秒で演出完了
      setTimeout(() => {
        overlay.classList.remove("is-active", "is-fading-out");
        overlay.setAttribute("aria-hidden", "true");

        // デモなので current を完全に隠す
        pageCurrent.style.display = "none";

        isTransitionRunning = false;

        // 実遷移にしたい場合はここで location.href = "/next-page.html";
      }, 2000);
    }

    startBtn.addEventListener("click", activateLoading);

    // =========================
    // 2進数: 上から下へ
    // =========================
    const binaryCanvas = document.getElementById("binaryCanvas");
    const ctx = binaryCanvas.getContext("2d");

    let bw = 0;
    let bh = 0;
    let binaryColumns = [];
    const binaryFontSize = 18;

    function resizeBinaryCanvas() {
      bw = binaryCanvas.width = window.innerWidth;
      bh = binaryCanvas.height = window.innerHeight;

      const columnCount = Math.floor(bw / binaryFontSize);
      binaryColumns = Array.from({ length: columnCount }, () => ({
        y: Math.random() * -bh,
        speed: 1.1 + Math.random() * 2.1
      }));
    }

    function drawBinaryRain() {
      ctx.fillStyle = "rgba(2, 7, 14, 0.14)";
      ctx.fillRect(0, 0, bw, bh);

      ctx.font = binaryFontSize + "px monospace";

      binaryColumns.forEach((column, index) => {
        const x = index * binaryFontSize;
        const char = Math.random() > 0.5 ? "1" : "0";

        ctx.fillStyle = "rgba(110,255,219,0.85)";
        ctx.fillText(char, x, column.y);

        column.y += column.speed * binaryFontSize * 0.45;

        if (column.y > bh + 40) {
          column.y = -20 - Math.random() * 240;
          column.speed = 1.1 + Math.random() * 2.1;
        }
      });

      requestAnimationFrame(drawBinaryRain);
    }

    // =========================
    // 16進数: 右から左へ
    // =========================
    function randomHexByte() {
      return "0x" + Math.floor(Math.random() * 256)
        .toString(16)
        .toUpperCase()
        .padStart(2, "0");
    }

    function buildHexString(len = 26) {
      return Array.from({ length: len }, () => randomHexByte()).join("   ");
    }

    function createHexRows() {
      hexLayer.innerHTML = "";

      const rowCount = 12;
      for (let i = 0; i < rowCount; i++) {
        const row = document.createElement("div");
        row.className = "hex-row";
        row.textContent = buildHexString(26 + Math.floor(Math.random() * 10));

        row.style.top = (6 + i * 7.2 + Math.random() * 2.2) + "%";
        row.style.animationDuration = (7 + Math.random() * 7) + "s";
        row.style.animationDelay = (-Math.random() * 10) + "s";
        row.style.opacity = (0.25 + Math.random() * 0.5).toFixed(2);
        row.style.fontSize = (12 + Math.random() * 6) + "px";

        hexLayer.appendChild(row);
      }
    }

    // 下部のメタ文字列も更新
    function createMixedMeta() {
      const parts = [];
      for (let i = 0; i < 12; i++) {
        if (Math.random() > 0.55) {
          let bin = "";
          for (let j = 0; j < 8; j++) {
            bin += Math.random() > 0.5 ? "1" : "0";
          }
          parts.push(bin);
        } else {
          parts.push(randomHexByte());
        }
      }
      return parts.join("  ");
    }

    setInterval(() => {
      loadingMeta.textContent = createMixedMeta();
    }, 180);

    window.addEventListener("resize", () => {
      resizeBinaryCanvas();
      createHexRows();
    });

    resizeBinaryCanvas();
    createHexRows();
    drawBinaryRain();
  </script>
</body>
</html>
